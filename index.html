<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesorios Apple | Exclusive Collection</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --accent-color: #000000;
            --text-main: #1d1d1f;
            --text-secondary: #6e6e73;
            --card-bg: #f5f5f7;
        }

        body { 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        header { 
            text-align: center; 
            padding: 100px 20px 60px;
            background: linear-gradient(to bottom, #fbfbfb, #ffffff);
        }

        header h1 { font-size: 48px; font-weight: 600; margin: 0; letter-spacing: -1px; }

        header p { 
            color: var(--text-secondary); 
            font-size: 14px; 
            margin-top: 15px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 400;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 50px; 
        }

        .product-card { 
            text-align: center; 
            padding: 45px 25px;
            background: var(--card-bg);
            border-radius: 28px;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid transparent;
            cursor: pointer;
        }

        .product-card:hover { 
            transform: translateY(-10px);
            background: #fff;
            box-shadow: 0 40px 80px rgba(0,0,0,0.06);
            border: 1px solid #f0f0f0;
        }

        .img-container {
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 35px;
        }

        .product-card img { 
            max-width: 85%; 
            max-height: 85%; 
            object-fit: contain;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.03));
        }

        .product-info h2 { font-size: 22px; margin: 0; font-weight: 500; letter-spacing: -0.3px; }

        .divider { width: 30px; height: 2px; background: var(--accent-color); margin: 20px auto; }

        .product-price { font-size: 24px; font-weight: 300; margin-bottom: 10px; color: var(--text-main); }
        
        .view-more { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }

        /* Estilos del Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255,255,255,0.98);
            overflow: auto;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            margin: 5% auto;
            padding: 40px;
            width: 90%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .modal-img { max-width: 300px; margin-bottom: 30px; }
        
        .modal-desc { 
            max-width: 500px; 
            color: var(--text-secondary); 
            line-height: 1.6; 
            margin-bottom: 30px; 
            font-size: 16px;
        }

        .close {
            position: absolute;
            right: 30px;
            top: 20px;
            font-size: 40px;
            font-weight: 200;
            cursor: pointer;
        }

        .btn-wsp { 
            display: inline-block; 
            background-color: var(--accent-color); 
            color: #fff; 
            text-decoration: none; 
            padding: 16px 40px; 
            border-radius: 50px; 
            font-weight: 500;
            font-size: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        footer { text-align: center; padding: 100px 40px; font-size: 10px; color: #bcbcbc; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <h1>Accesorios Apple</h1>
    <p>San Juan &bull; Argentina</p>
</header>

<div class="container">
    <div class="product-grid">

        <div class="product-card" onclick="openModal('Airpods Pro 2', 'Airpod git.png', '$25.000', 'Cancelación activa de ruido de última generación. Modo ambiente adaptativo para escuchar lo que te rodea. Audio espacial personalizado con seguimiento dinámico de la cabeza. Incluye estuche de carga MagSafe con altavoz y enganche para correa.')">
            <div class="img-container">
                <img src="Airpod git.png" alt="Airpods Pro 2">
            </div>
            <div class="product-info">
                <h2>Airpods Pro 2</h2>
                <div class="divider"></div>
                <div class="product-price">$25.000</div>
                <span class="view-more">Ver detalles</span>
            </div>
        </div>

        <div class="product-card" onclick="openModal('Airpods Max', 'Airpods max.png', '$40.000', 'Diseño circumaural que combina un ajuste a medida con una acústica excepcional. Transductor dinámico diseñado por Apple para un sonido de alta fidelidad. Cancelación de ruido líder en la industria y audio espacial personalizado.')">
            <div class="img-container">
                <img src="Airpods max.png" alt="Airpods Max">
            </div>
            <div class="product-info">
                <h2>Airpods Max</h2>
                <div class="divider"></div>
                <div class="product-price">$40.000</div>
                <span class="view-more">Ver detalles</span>
            </div>
        </div>

        <div class="product-card" onclick="openModal('Cabezal 20W', 'Cabezal.png', '$8.000', 'El adaptador de corriente USB-C de 20W de Apple ofrece una carga rápida y eficiente. Es ideal para cargar tu iPhone 8 o posterior a la mitad de su capacidad en unos 30 minutos.')">
            <div class="img-container">
                <img src="Cabezal.png" alt="Cabezal">
            </div>
            <div class="product-info">
                <h2>Cabezal 20W</h2>
                <div class="divider"></div>
                <div class="product-price">$8.000</div>
                <span class="view-more">Ver detalles</span>
            </div>
        </div>

        <div class="product-card" onclick="openModal('Cable C a Lightning', 'Cable C a Lig.png', '$4.000', 'Conecta tu iPhone, iPad o iPod con conector Lightning a tu Mac o iPad con puerto USB-C para cargarlo o sincronizarlo de forma rápida y segura.')">
            <div class="img-container">
                <img src="Cable C a Lig.png" alt="Cable C a Lig">
            </div>
            <div class="product-info">
                <h2>Cable C a Lightning</h2>
                <div class="divider"></div>
                <div class="product-price">$4.000</div>
                <span class="view-more">Ver detalles</span>
            </div>
        </div>

        <div class="product-card" onclick="openModal('Cable C a C (1m)', 'Cable C a C.png', '$4.000', 'Cable de carga USB-C de 1 metro con conectores USB-C en ambos extremos. Ideal para cargar, sincronizar y transferir datos entre dispositivos USB-C.')">
            <div class="img-container">
                <img src="Cable C a C.png" alt="Cable C a C">
            </div>
            <div class="product-info">
                <h2>Cable C a C (1m)</h2>
                <div class="divider"></div>
                <div class="product-price">$4.000</div>
                <span class="view-more">Ver detalles</span>
            </div>
        </div>

    </div>
</div>

<div id="productModal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <div class="modal-content">
        <img id="modalImg" class="modal-img" src="" alt="">
        <h2 id="modalTitle" style="font-size: 32px; margin-bottom: 10px;"></h2>
        <div class="divider"></div>
        <p id="modalPrice" style="font-size: 24px; margin-bottom: 20px;"></p>
        <p id="modalDesc" class="modal-desc"></p>
        <a id="modalWsp" href="" class="btn-wsp">Consultar por WhatsApp</a>
    </div>
</div>

<footer>
    <p>&copy; 2026 Accesorios Apple &bull; San Juan, Argentina</p>
</footer>

<script>
    function openModal(title, img, price, desc) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalImg').src = img;
        document.getElementById('modalPrice').innerText = price;
        document.getElementById('modalDesc').innerText = desc;
        document.getElementById('modalWsp').href = "https://wa.me/5492645084925?text=Hola! Me interesa: " + title + " (" + price + ")";
        document.getElementById('productModal').style.display = "block";
    }

    function closeModal() {
        document.getElementById('productModal').style.display = "none";
    }

    window.onclick = function(event) {
        if (event.target == document.getElementById('productModal')) {
            closeModal();
        }
    }
</script>

</body>
</html>
