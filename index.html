<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesorios Apple | Exclusive Collection</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --accent-color: #000000;
            --text-main: #1d1d1f;
            --text-secondary: #6e6e73;
            --card-bg: #f5f5f7;
        }

        body { 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Header refinado */
        header { 
            text-align: center; 
            padding: 100px 20px 60px;
            background: linear-gradient(to bottom, #fbfbfb, #ffffff);
        }

        header h1 { 
            font-size: 48px; 
            font-weight: 600; 
            margin: 0; 
            letter-spacing: -1px;
            /* Se eliminó text-transform: lowercase para respetar tus mayúsculas */
        }

        header p { 
            color: var(--text-secondary); 
            font-size: 14px; 
            margin-top: 15px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 400;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        
        /* Grid elegante */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 50px; 
        }

        .product-card { 
            text-align: center; 
            padding: 45px 25px;
            background: var(--card-bg);
            border-radius: 28px;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid transparent;
        }

        .product-card:hover { 
            transform: translateY(-10px);
            background: #fff;
            box-shadow: 0 40px 80px rgba(0,0,0,0.06);
            border: 1px solid #f0f0f0;
        }

        .img-container {
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 35px;
        }

        .product-card img { 
            max-width: 85%; 
            max-height: 85%; 
            object-fit: contain;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.03));
        }

        .product-info h2 { 
            font-size: 22px; 
            margin: 0; 
            font-weight: 500; 
            letter-spacing: -0.3px;
        }

        .divider {
            width: 30px;
            height: 2px;
            background: var(--accent-color);
            margin: 20px auto;
        }

        .product-price { 
            font-size: 24px; 
            font-weight: 300; 
            margin-bottom: 35px; 
            color: var(--text-main); 
        }

        /* Botón sobrio */
        .btn-wsp { 
            display: inline-block; 
            background-color: var(--accent-color); 
            color: #fff; 
            text-decoration: none; 
            padding: 16px 40px; 
            border-radius: 50px; 
            font-weight: 500;
            font-size: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.4s ease;
        }

        .btn-wsp:hover { 
            background-color: #333;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        footer { 
            text-align: center; 
            padding: 100px 40px; 
            font-size: 10px; 
            color: #bcbcbc;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<header>
    <h1>Accesorios Apple</h1>
    <p>San Juan &bull; Argentina</p>
</header>

<div class="container">
    <div class="product-grid">

        <div class="product-card">
            <div class="img-container">
                <img src="Airpod git.png" alt="Airpods Pro 2">
            </div>
            <div class="product-info">
                <h2>Airpods Pro 2</h2>
                <div class="divider"></div>
                <div class="product-price">$25.000</div>
                <a href="https://wa.me/5492645084925?text=Hola! Me interesan los Airpods Pro 2 ($25000)" class="btn-wsp">Consultar</a>
            </div>
        </div>

        <div class="product-card">
            <div class="img-container">
                <img src="https://images.unsplash.com/photo-1613040809024-b4ef7ba99bc3?auto=format&fit=crop&q=80&w=500" alt="Airpods Max">
            </div>
            <div class="product-info">
                <h2>Airpods Max</h2>
                <div class="divider"></div>
                <div class="product-price">$40.000</div>
                <a href="https://wa.me/5492645084925?text=Hola! Me interesan los Airpods Max ($40000)" class="btn-wsp">Consultar</a>
            </div>
        </div>

        <div class="product-card">
            <div class="img-container">
                <img src="https://www.apple.com/newsroom/images/product/accessories/standard/Apple-20W-USB-C-Power-Adapter-screen_inline.jpg.large.jpg" alt="Cabezal 20W">
            </div>
            <div class="product-info">
                <h2>Cabezal 20W</h2>
                <div class="divider"></div>
                <div class="product-price">$8.000</div>
                <a href="https://wa.me/5492645084925?text=Hola! Me interesa el Cabezal 20W ($8000)" class="btn-wsp">Consultar</a>
            </div>
        </div>

        <div class="product-card">
            <div class="img-container">
                <img src="https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/MM0A3?wid=1144&hei=1144&fmt=jpeg&qlt=95&.v=1632777176000" alt="Cable C a Lightning">
            </div>
            <div class="product-info">
                <h2>C a Lightning</h2>
                <div class="divider"></div>
                <div class="product-price">$4.000</div>
                <a href="https://wa.me/5492645084925?text=Hola! Me interesa el Cable Tipo C a Lightning ($4000)" class="btn-wsp">Consultar</a>
            </div>
        </div>

        <div class="product-card">
            <div class="img-container">
                <img src="https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/MQW23?wid=1144&hei=1144&fmt=jpeg&qlt=95&.v=1692911226068" alt="Cable C a C">
            </div>
            <div class="product-info">
                <h2>C a C (1m)</h2>
                <div class="divider"></div>
                <div class="product-price">$4.000</div>
                <a href="https://wa.me/5492645084925?text=Hola! Me interesa el Cable Tipo C a C ($4000)" class="btn-wsp">Consultar</a>
            </div>
        </div>

    </div>
</div>

<footer>
    <p>&copy; 2026 Accesorios Apple &bull; San Juan, Argentina</p>
</footer>

</body>

</html>
